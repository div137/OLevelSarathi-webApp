name: Build & Deploy Static Blog Pages

on:
  repository_dispatch:
    types: [blog-updated]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual deploy'
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build-and-deploy:
    name: Build React + Generate Static Blog + Deploy to Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build
        env:
          NODE_ENV: production

      - name: Generate static blog pages
        run: node scripts/generate-blog-pages.js
        env:
          NODE_ENV: production

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: olevelsarathi
          channelId: live

      - name: Print deploy summary
        run: |
          echo "✅ Deploy complete!"
          echo "🌐 Live at: https://olevelsarathi.in"
