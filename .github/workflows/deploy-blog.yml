name: Build & Deploy Static Blog Pages

on:
  repository_dispatch:
    types: [blog-updated]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual deploy'
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build-and-deploy:
    name: Build React + Generate Static Blog + Deploy to Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build
        env:
          NODE_ENV: production

      - name: Generate static blog pages
        run: node scripts/generate-blog-pages.js
        env:
          NODE_ENV: production

      - name: Setup Firebase Service Account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > $HOME/firebase-service-account.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/firebase-service-account.json" >> $GITHUB_ENV

      - name: Deploy to Firebase Hosting
        run: |
          npx firebase-tools@latest deploy \
            --only hosting:olevelsarathi \
            --project olevelsarathi \
            --non-interactive \
            --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}

      - name: Cleanup credentials
        if: always()
        run: rm -f $HOME/firebase-service-account.json

      - name: Print deploy summary
        run: |
          echo "✅ Deploy complete!"
          echo "🌐 Live at: https://olevelsarathi.in"
          echo "📝 Triggered by: ${{ github.event_name }}"
