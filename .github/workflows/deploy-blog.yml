name: Build & Deploy Static Blog Pages

on:
  # Triggered by Admin Panel via GitHub API (repository_dispatch)
  repository_dispatch:
    types: [blog-updated]

  # Manual trigger from GitHub Actions UI (fallback)
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual deploy'

  # Safety net: auto-deploy every 6 hours if any blog was updated
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build-and-deploy:
    name: Build React + Generate Static Blog + Deploy to Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ───────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build React app (Vite) ──────────────────────────────────────────
      - name: Build React app
        run: npm run build
        env:
          NODE_ENV: production

      # ── 5. Generate static blog HTML pages ────────────────────────────────
      - name: Generate static blog pages
        run: node scripts/generate-blog-pages.js
        env:
          NODE_ENV: production

      # ── 6. Deploy to Firebase Hosting ─────────────────────────────────────
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: olevelsarathi
          target: olevelsarathi
          channelId: live

      # ── 7. Summary ────────────────────────────────────────────────────────
      - name: Print deploy summary
        run: |
          echo "✅ Deploy complete!"
          echo "🌐 Live at: https://olevelsarathi.in"
          echo "📝 Triggered by: ${{ github.event_name }}"
